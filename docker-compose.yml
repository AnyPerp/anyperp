services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: anyperp
      POSTGRES_PASSWORD: anyperp
      POSTGRES_DB: anyperp
    ports: ["${POSTGRES_PORT:-5432}:5432"]
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anyperp -d anyperp"]
      interval: 5s
      timeout: 3s
      retries: 20
  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["${REDIS_PORT:-6379}:6379"]
    volumes: ["redis-data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
  prometheus:
    image: prom/prometheus:v3.1.0
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./ops/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]

volumes:
  postgres-data:
  redis-data:
