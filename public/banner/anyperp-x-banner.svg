<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500" fill="none" role="img" aria-label="AnyPerp banner">
  <!-- Light canvas base -->
  <rect width="1500" height="500" fill="#F4F7F4"/>

  <!-- Soft grid -->
  <g opacity="0.35" stroke="#E8EBE8" stroke-width="1">
    <path d="M0 100 H1500 M0 200 H1500 M0 300 H1500 M0 400 H1500"/>
    <path d="M150 0 V500 M300 0 V500 M450 0 V500 M600 0 V500 M750 0 V500 M900 0 V500 M1050 0 V500 M1200 0 V500 M1350 0 V500"/>
  </g>

  <!-- Soft green / red washes -->
  <ellipse cx="180" cy="250" rx="320" ry="280" fill="#00C805" opacity="0.08"/>
  <ellipse cx="1320" cy="250" rx="320" ry="280" fill="#FF5000" opacity="0.08"/>

  <!-- Left bars -->
  <g transform="translate(120 250)">
    <rect x="0" y="40" width="36" height="100" rx="10" fill="#00C805"/>
    <rect x="52" y="-110" width="36" height="250" rx="10" fill="#FF5000"/>
    <rect x="104" y="-40" width="36" height="180" rx="10" fill="#009604"/>
  </g>

  <!-- Right bars -->
  <g transform="translate(1220 250)">
    <rect x="0" y="-60" width="36" height="200" rx="10" fill="#009604"/>
    <rect x="52" y="-110" width="36" height="250" rx="10" fill="#FF5000"/>
    <rect x="104" y="20" width="36" height="120" rx="10" fill="#00C805"/>
  </g>

  <!-- Center copy -->
  <text x="750" y="200" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" font-size="72" font-weight="800" fill="#000000" letter-spacing="-1.5">AnyPerp</text>
  <text x="750" y="268" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" font-size="32" font-weight="600" fill="#008A04" letter-spacing="0.5">Any token. A perp. Today.</text>

  <rect x="620" y="300" width="260" height="3" rx="2" fill="#E8EBE8"/>
  <rect x="700" y="300" width="40" height="3" rx="2" fill="#00C805"/>
  <rect x="760" y="300" width="40" height="3" rx="2" fill="#FF5000"/>

  <text x="750" y="350" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="500" fill="#6A6A6A">Permissionless isolated perps · Robinhood Chain · anyperp.fun</text>

  <rect x="0" y="492" width="750" height="8" fill="#00C805"/>
  <rect x="750" y="492" width="750" height="8" fill="#FF5000"/>
</svg>
